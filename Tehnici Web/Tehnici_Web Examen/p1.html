<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
#box {
    width: 66.67vw;
    height: 66.67vh;
    padding: 5px;
    border: 1px solid black;
    display: grid;
    grid-template-rows: repeat(5, 1fr);
    grid-template-columns: repeat(4, 1fr);
        }
        #A {
            grid-row: 1;
            grid-column: 2 / span 2;
        }
        #B {
            grid-row: 2;
            grid-column: 1 / span 2;
        }
        #C {
            grid-row: 2;
            grid-column: 3 / span 2;
        }
        #D {
            grid-row: 3;
            grid-column: 1 / span 4;
        }
        #E {
            grid-row: 4 / span 2;
            grid-column: 1;
        }
        #F {
            grid-row: 4 / span 2;
            grid-column: 4;
        }
#box div:nth-child(n){
    padding: 10px;
    border-style: double;
    border-color: red;
    margin: 5px;
}
#box div:nth-child(3n) {
    background-color: yellow;
    color: black;
}
#box div:not(:nth-child(3n)) {
    background-color: gray;
    color: white;}

@media screen and (min-width: 250px) and (max-width: 600px) {
    #box {
        grid-template-columns: 1fr;
    }
}
    #box.hover {
        height: 2*height;
        div:nth-child(last-child)
        {
            border-color: blue;
            transition: 3s;

        }
    }
    

</style>
<body>
    <div id="box">
        <div id="A">A</div>
        <div id="B">B</div>
        <div id="C">C</div>
        <div id="D">D</div>
        <div id="E">E</div>
        <div id="F">F</div>
    </div>
</body>
</html>
